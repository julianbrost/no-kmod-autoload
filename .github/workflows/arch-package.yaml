name: Arch Package
on:
  push: {}
  pull_request: {}
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: docker.io/archlinux:base-devel
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install build tools
        run: pacman -Syu --noconfirm namcap

      - name: Create build user
        run: useradd -m -s /bin/bash build && chown -R build .

      - name: Build package
        run: runuser -u build -- makepkg

      - name: Lint package
        run: runuser -u build -- namcap PKGBUILD *.pkg.tar.zst

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: arch-package
          path: ./*.pkg.tar.zst

  upload-release:
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: arch-package

      - name: Upload to release
        run: gh release --repo "$REPO" upload "$TAG_NAME" *.pkg.tar.zst
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.event.release.tag_name }}
